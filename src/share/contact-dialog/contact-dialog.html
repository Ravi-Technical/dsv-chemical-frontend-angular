<section class="model_popup">
    <span class="closeDialog" (click)="closeDialog()">X</span>
<h2 mat-dialog-title>Contact Us</h2>

<mat-dialog-content>
    <form [formGroup]="contactForm">
        <div class="form-row">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Name</mat-label>
                <input matInput formControlName="name">
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Email</mat-label>
                <input matInput formControlName="email">
            </mat-form-field>
        </div>
        <div class="form-row">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Phone</mat-label>
                <input matInput formControlName="phone">
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Subject</mat-label>
                <input matInput formControlName="subject">
            </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Message</mat-label>
            <textarea matInput rows="3" formControlName="message"></textarea>
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button class="color-red" mat-button (click)="closeDialog()">Cancel</button>
    <button class="color-success" mat-raised-button color="primary" (click)="submitForm()" [disabled]="contactForm.invalid">Submit</button>
</mat-dialog-actions>

</section>
